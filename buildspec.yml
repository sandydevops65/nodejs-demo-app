version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install

  build:
    commands:
      - echo Build started...
      - npm run build

  post_build:
    commands:
      - echo Deploying to S3...
      - aws s3 sync public/ s3://nodejs-demo-400138960236 --delete

artifacts:
  files:
    - '**/*'
